<!DOCTYPE html>
<html>

<head>
<title>AeroSafe Login</title>

<style>

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
font-family:Arial;
}

.login{
background:#101a2e;
padding:40px;
border-radius:10px;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:200px;
}

button{
padding:10px;
width:100%;
background:#22c1c3;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login">

<h2>AeroSafe Login</h2>

<form action="/login" method="POST">

<input name="username" placeholder="Username">

<input name="password" type="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
